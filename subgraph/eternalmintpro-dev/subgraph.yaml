specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: EternalMintNfts
    network: autonomys-chronos
    source:
      address: "0x2601FB64e5cA137f273Fa64c28056a040d132A1b"
      abi: EternalMintNfts
      startBlock: 282110
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - ApprovalForAll
        - BatchDistribution
        - NftMinted
        - RoleAdminChanged
        - RoleGranted
        - RoleRevoked
        - SingleDistribution
        - TransferBatch
        - TransferSingle
        - URI
      abis:
        - name: EternalMintNfts
          file: ./abis/EternalMintNfts.json
      eventHandlers:
        - event: ApprovalForAll(indexed address,indexed address,bool)
          handler: handleApprovalForAll
        - event: BatchDistribution(indexed address,uint256[],address[],uint256[],uint256)
          handler: handleBatchDistribution
        - event: NftMinted(indexed address,indexed uint256,uint256,string)
          handler: handleNftMinted
        - event: RoleAdminChanged(indexed bytes32,indexed bytes32,indexed bytes32)
          handler: handleRoleAdminChanged
        - event: RoleGranted(indexed bytes32,indexed address,indexed address)
          handler: handleRoleGranted
        - event: RoleRevoked(indexed bytes32,indexed address,indexed address)
          handler: handleRoleRevoked
        - event: SingleDistribution(indexed address,indexed uint256,indexed address,uint256,uint256)
          handler: handleSingleDistribution
        - event: TransferBatch(indexed address,indexed address,indexed address,uint256[],uint256[])
          handler: handleTransferBatch
        - event: TransferSingle(indexed address,indexed address,indexed address,uint256,uint256)
          handler: handleTransferSingle
        - event: URI(string,indexed uint256)
          handler: handleURI
      file: ./src/eternal-mint-nfts.ts
